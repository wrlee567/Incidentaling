services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      # The browser talks to the backend on the host, so use localhost here.
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    depends_on:
      - backend
